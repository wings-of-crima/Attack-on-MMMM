<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dettaglio Oggetto | Attack on MMMM</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link id="theme-stylesheet" type="text/css" rel="stylesheet" href="styles/main.css" />
</head>

<body>
    <div id="headerNav-placeholder" style="display: contents;"></div>

    <main class="container-fluid" id="main-content">
        <section class="item-detail py-5">
            <div class="container">
                
                <div class="row mb-4">
                    <div class="col-12 text-center">
                        <h2 class="section-title text-uppercase" id="item-title"></h2>
                        <hr class="mx-auto border-secondary manga-divider">
                    </div>
                </div>

                <div class="row g-5 mb-5 justify-content-center">
                    <div class="col-md-6">
                        <div class="manga-frame-container">
                            <div class="manga-label">Real Artifact</div>
                            <div class="manga-img-wrapper" onclick="openLightbox(document.getElementById('main-img-real').src)">
                                <img src="" id="main-img-real" alt="Real Object">
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="manga-frame-container">
                            <div class="manga-label">Anime Reference</div>
                            <div class="manga-img-wrapper" onclick="openLightbox(document.getElementById('main-img-anime').src)">
                                <img src="" id="main-img-anime" alt="Anime Version">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mb-5 justify-content-center">
                    <div class="col-auto d-flex flex-column flex-md-row gap-4 align-items-center">
                        <div class="d-flex gap-3">
                            <input type="radio" class="btn-check" name="difficulty" id="btn-simple" checked onclick="setDifficulty('simple')">
                            <label class="btn btn-exhibit px-4" for="btn-simple">Simple</label>

                            <input type="radio" class="btn-check" name="difficulty" id="btn-advanced" onclick="setDifficulty('advanced')">
                            <label class="btn btn-exhibit px-4" for="btn-advanced">Advanced</label>
                        </div>

                        <div class="d-flex gap-3">
                            <input type="radio" class="btn-check" name="length" id="btn-short" checked onclick="setLength('short')">
                            <label class="btn btn-exhibit px-3" for="btn-short">Show Less</label>

                            <input type="radio" class="btn-check" name="length" id="btn-long" onclick="setLength('long')">
                            <label class="btn btn-exhibit px-3" for="btn-long">Show More</label>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-8">
                        <div class="description-container p-4 h-100">
                            <p id="dynamic-text" class="section-text"></p>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="metadata-box p-4 bg-dark h-100">
                            <h5 class="text-secondary text-uppercase mb-4 small">Object Metadata</h5>
                            <ul class="list-unstyled mb-0">
                                <li class="mb-3">
                                    <strong class="text-uppercase small text-secondary">Title:</strong> 
                                    <span id="meta-title" class="d-block"></span>
                                </li>
                                <li class="mb-3">
                                    <strong class="text-uppercase small text-secondary">Type:</strong> 
                                    <span id="meta-type" class="d-block"></span>
                                </li>
                                <li class="mb-3">
                                    <strong class="text-uppercase small text-secondary">Period:</strong> 
                                    <span id="meta-period" class="d-block"></span>
                                </li>
                                <li>
                                    <strong class="text-uppercase small text-secondary">Institution:</strong> 
                                    <span id="meta-institution" class="d-block"></span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12 d-flex justify-content-between">
                        <a id="prev-item" href="#" class="btn-manga-nav">« PREV</a>
                        <a id="next-item" href="#" class="btn-manga-nav">NEXT »</a>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <div id="manga-lightbox" class="lightbox-overlay" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/themes.js"></script>
    <script src="scripts/comps.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/item-logic.js"></script>

    <script>
        function openLightbox(src) {
            if(!src) return;
            const lb = document.getElementById('manga-lightbox');
            const img = document.getElementById('lightbox-img');
            lb.style.display = "block";
            img.src = src;
            document.body.style.overflow = "hidden";
        }
        function closeLightbox() {
            const lb = document.getElementById('manga-lightbox');
            lb.style.display = "none";
            document.body.style.overflow = "auto";
        }
    </script>
</body>
</html>
